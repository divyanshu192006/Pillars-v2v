  <!-- arms -->
  <path d="M134 105 Q128 110 126 116" stroke="#fde68a" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M162 105 Q168 110 170 116" stroke="#fde68a" stroke-width="5" stroke-linecap="round" fill="none"/>
  <text x="148" y="143" text-anchor="middle" font-size="8" font-weight="700" fill="#be185d">Wk 20</text>
  <text x="148" y="154" text-anchor="middle" font-size="7" fill="#9ca3af">Banana size</text>
  <!-- Week 32 — larger -->
  <circle cx="252" cy="72" r="34" fill="#fff7ed"/>
  <ellipse cx="252" cy="74" rx="17" ry="22" fill="#fde68a" opacity="0.8"/>
  <circle cx="252" cy="58" r="13" fill="#fde68a"/>
  <!-- clearer face -->
  <circle cx="247" cy="56" rx="2" fill="#374151"/>
  <circle cx="257" cy="56" rx="2" fill="#374151"/>
  <path d="M247 62 Q252 66 257 62" stroke="#9d174d" stroke-width="1.2" fill="none"/>
  <!-- ears -->
  <ellipse cx="239" cy="58" rx="3" ry="4" fill="#fbbf24" opacity="0.7"/>
  <ellipse cx="265" cy="58" rx="3" ry="4" fill="#fbbf24" opacity="0.7"/>
  <path d="M235 72 Q228 80 226 90" stroke="#fde68a" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M269 72 Q276 80 278 90" stroke="#fde68a" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- legs curled -->
  <path d="M243 94 Q238 106 240 114" stroke="#fde68a" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M261 94 Q266 106 264 114" stroke="#fde68a" stroke-width="6" stroke-linecap="round" fill="none"/>
  <text x="252" y="114" text-anchor="middle" font-size="8" font-weight="700" fill="#c2410c">Wk 32</text>
  <text x="252" y="125" text-anchor="middle" font-size="7" fill="#9ca3af">Squash size</text>
  <!-- Connecting dots -->
  <circle cx="90" cy="130" r="4" fill="#f9a8d4"/>
  <circle cx="110" cy="118" r="4" fill="#f9a8d4"/>
  <circle cx="200" cy="90" r="4" fill="#fbbf24"/>
  <circle cx="225" cy="82" r="4" fill="#fbbf24"/>
  <!-- Stars -->
  <circle cx="20" cy="60" r="3" fill="#a78bfa" opacity="0.6"/>
  <circle cx="330" cy="140" r="3" fill="#f472b6" opacity="0.6"/>
  <circle cx="310" cy="60" r="2.5" fill="#fbbf24" opacity="0.7"/>
