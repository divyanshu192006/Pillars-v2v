  <ellipse cx="55" cy="148" rx="10" ry="14" fill="#a78bfa" opacity="0.7"/>
  <ellipse cx="51" cy="143" rx="5" ry="7" fill="#c4b5fd" opacity="0.6"/>
  <text x="55" y="176" text-anchor="middle" font-size="8" font-weight="700" fill="#7c3aed">Wk 8</text>
  <text x="55" y="187" text-anchor="middle" font-size="7" fill="#9ca3af">Bean size</text>
  <!-- Week 20 — clearer form -->
  <circle cx="148" cy="108" r="28" fill="#fce7f3"/>
  <!-- Baby at 20 weeks -->
  <ellipse cx="148" cy="108" rx="14" ry="18" fill="#fde68a" opacity="0.8"/>
  <circle cx="148" cy="96" r="10" fill="#fde68a"/>
  <!-- tiny face -->
  <circle cx="145" cy="94" r="1.5" fill="#374151"/>
  <circle cx="151" cy="94" r="1.5" fill="#374151"/>
