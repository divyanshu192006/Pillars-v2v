  </defs>
  <!-- Soft glow background -->
  <ellipse cx="100" cy="140" rx="85" ry="100" fill="url(#glow8)" opacity="0.6"/>
  <!-- Amniotic sac subtle outline -->
  <ellipse cx="100" cy="145" rx="70" ry="85" fill="none" stroke="#f9a8d4" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <!-- Embryo — curled fetal position, week 8 (very small, ~1.6cm) -->
  <!-- Body -->
  <path d="M100 115 C88 118 80 130 82 148 C84 162 94 172 100 174 C106 172 116 162 118 148 C120 130 112 118 100 115Z" fill="url(#body8)"/>
  <!-- Large head (proportionally large at W8) -->
  <ellipse cx="100" cy="106" rx="22" ry="20" fill="#fde8d0"/>
  <ellipse cx="100" cy="104" rx="18" ry="16" fill="#fddbb8" opacity="0.5"/>
  <!-- Eye buds (closed, tiny) -->
  <ellipse cx="93" cy="104" rx="3" ry="2" fill="#f0c090" opacity="0.8"/>
  <ellipse cx="107" cy="104" rx="3" ry="2" fill="#f0c090" opacity="0.8"/>
  <!-- Tiny arm buds -->
  <path d="M82 130 C74 128 70 132 68 136" stroke="#f9c9a0" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M118 130 C126 128 130 132 132 136" stroke="#f9c9a0" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Leg buds -->
  <path d="M90 170 C85 178 84 186 85 192" stroke="#f9c9a0" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M110 170 C115 178 116 186 115 192" stroke="#f9c9a0" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Umbilical cord subtle -->
  <path d="M100 174 C100 185 97 195 96 205" stroke="#f9a8d4" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Week label -->
  <text x="100" y="240" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#be185d" opacity="0.8">Week 8</text>
  <text x="100" y="254" text-anchor="middle" font-family="system-ui" font-size="9" fill="#9ca3af">~1.6 cm</text>
</svg>
