<svg viewBox="0 0 200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow8" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fce7f3" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fdf2f8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="body8" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde8d0"/>
      <stop offset="100%" stop-color="#f9c9a0"/>
